name: Keep Supabase Projects Alive

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process all projects
        env:
          # Define projects as a JSON array (you can expand this)
          PROJECTS: |
            [
              {"name":"Track2Link v1.1 (xzcotx)","ref":"xzcotxqdrhfzadlpbxwq","secret":"TRACK2LINK_ANON_KEY_V1_1"},
              {"name":"Track2Link v1.1 (clfndn)","ref":"clfndnqtihioqheubzmx","secret":"TRACK2LINK_ANON_KEY_v1"}
            ]
        run: |
          mkdir -p docs/data
          echo "$PROJECTS" | jq -c '.[]' | while read project; do
            name=$(echo "$project" | jq -r '.name')
            ref=$(echo "$project" | jq -r '.ref')
            secret=$(echo "$project" | jq -r '.secret')
            
            # Ping
            curl -X POST "https://${ref}.supabase.co/rest/v1/rpc/ping_keep_alive" \
                 -H "apikey: ${{ secrets[secret] }}" \
                 -H "Authorization: Bearer ${{ secrets[secret] }}" \
                 -H "Content-Type: application/json" -d '{}'
            
            # Fetch status and append to temporary file (add project name)
            curl -s -X GET "https://${ref}.supabase.co/rest/v1/keep_alive?select=last_ping,uptime_days" \
                 -H "apikey: ${{ secrets[secret] }}" \
                 -H "Authorization: Bearer ${{ secrets[secret] }}" \
                 | jq --arg name "$name" '[.[] | . + {project: $name}]' >> all_status.json
          done

          # Move final combined JSON to docs/data
          mv all_status.json docs/data/status.json

      - name: Commit and push status.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/status.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update status.json [skip ci]"
          git push
