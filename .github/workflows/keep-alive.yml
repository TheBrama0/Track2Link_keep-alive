name: Keep Supabase Projects Alive

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - name: "Track2Link v1.1"
            ref: xzcotxqdrhfzadlpbxwq
            secret: TRACK2LINK_ANON_KEY_v1_1
          - name: "Track2Link v1.1"
            ref: clfndnqtihioqheubzmx
            secret: TRACK2LINK_ANON_KEY_v1
          # 👆 To add a new project, just copy-paste a block like above
          #    and change name, ref, and secret name.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping and fetch ${{ matrix.project.name }}
        run: |
          # Get the secret value (GitHub injects it directly here)
          APIKEY="${{ secrets[matrix.project.secret] }}"
          # Ping
          curl -X POST "https://${{ matrix.project.ref }}.supabase.co/rest/v1/rpc/ping_keep_alive" \
               -H "apikey: ${APIKEY}" \
               -H "Authorization: Bearer ${APIKEY}" \
               -H "Content-Type: application/json" -d '{}'
          # Fetch status and add project name
          curl -s -X GET "https://${{ matrix.project.ref }}.supabase.co/rest/v1/keep_alive?select=last_ping,uptime_days" \
               -H "apikey: ${APIKEY}" \
               -H "Authorization: Bearer ${APIKEY}" \
               | jq --arg name "${{ matrix.project.name }}" '[.[] | . + {project: $name}]' > "status-${{ matrix.project.ref }}.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: status-${{ matrix.project.ref }}
          path: status-${{ matrix.project.ref }}.json

  combine:
    needs: ping
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge JSON files
        run: |
          mkdir -p docs/data
          # Merge all JSON files (each is an array of one object) into one array
          jq -s 'add' artifacts/*/status-*.json > docs/data/status.json

      - name: Commit and push status.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/status.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update status.json [skip ci]"
          git push
